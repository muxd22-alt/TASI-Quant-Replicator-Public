name: Hourly Quant Analysis
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance pandas numpy

      - name: Run model
        run: python model.py

      - name: Commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data.json public/cache_db.json public/portfolio.json quant_model_results.csv
          git diff --staged --quiet || (git commit -m "chore: update quant data" && git push)
