name: Hourly Quant Analysis
on:
  schedule:
    # 5 AM UTC is 8 AM Riyadh Time. We can run it every hour to keep checking.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn requests

      - name: Run Quant Model
        run: python model.py

      - name: Commit and Push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data.json quant_model_results.csv
          git commit -m "chore: auto-update quant model analysis" || echo "No changes to commit"
          git push
