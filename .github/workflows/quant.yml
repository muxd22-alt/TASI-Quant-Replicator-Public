name: TASI Quant Model
on:
  schedule:
    # Hourly during Saudi market hours (Sun-Thu, 10AM-4PM Riyadh = 7AM-1PM UTC)
    # Builds cache gradually; portfolio rebalances once per day automatically
    - cron: "0 7-13 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance pandas numpy

      - name: Run model
        run: python model.py

      - name: Commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data.json docs/cache_db.json docs/portfolio.json quant_model_results.csv
          git diff --staged --quiet || (git commit -m "chore: update quant data" && git push)
