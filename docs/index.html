<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASI Quant Model</title>
  <meta name="description" content="Daily automated quantitative factor model for TASI market analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --emerald: #10B981; --emerald-dim: rgba(16,185,129,0.15);
      --red: #EF4444; --red-dim: rgba(239,68,68,0.12);
      --amber: #F59E0B;
      --bg: #05080F; --surface: rgba(15,23,42,0.6);
      --border: rgba(255,255,255,0.08); --text: #E2E8F0; --text-dim: #64748B;
      --mono: 'JetBrains Mono', monospace;
    }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(16,185,129,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(6,182,212,0.06) 0%, transparent 50%);
      color: var(--text); min-height: 100vh; line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.25rem; }
    .glass {
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem;
    }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 2.5rem; }
    header h1 {
      font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #10B981, #06B6D4);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    header p { color: var(--text-dim); font-size: 1rem; max-width: 450px; margin-top: 0.25rem; }
    .timestamp { font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: rgba(15,23,42,0.5); white-space: nowrap; }

    /* Portfolio banner */
    .ptf-banner {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;
      margin-bottom: 2rem;
    }
    .ptf-stat { text-align: center; }
    .ptf-stat .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .ptf-stat .val { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; margin-top: 0.25rem; }
    .ptf-stat .val.green { color: #6EE7B7; }
    .ptf-stat .val.red { color: #FCA5A5; }

    /* Positions table */
    .positions-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 1rem; }
    .positions-table th { text-align: left; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-weight: 600; }
    .positions-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .positions-table tr:hover { background: rgba(255,255,255,0.02); }
    .pnl-pos { color: var(--emerald); font-weight: 600; }
    .pnl-neg { color: var(--red); font-weight: 600; }

    /* Trade log */
    .trade-log { max-height: 300px; overflow-y: auto; }
    .trade-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.8rem; }
    .trade-side { font-family: var(--mono); font-weight: 600; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
    .trade-buy { background: var(--emerald-dim); color: #6EE7B7; }
    .trade-sell { background: var(--red-dim); color: #FCA5A5; }

    /* Section */
    .section-title { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; font-size: 1.5rem; font-weight: 600; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-green { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
    .dot-red { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .dot-amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(auto-fill, minmax(min(100%, 480px), 1fr)); }

    .card { position: relative; overflow: hidden; transition: box-shadow 0.4s; }
    .card:hover { box-shadow: 0 0 24px rgba(16,185,129,0.15); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .card-name { font-size: 1.15rem; font-weight: 700; }
    .card-ticker { font-family: var(--mono); font-size: 0.8rem; margin-top: 0.2rem; }
    .card-ticker.green { color: var(--emerald); }
    .card-ticker.red { color: var(--red); }
    .badge { font-family: var(--mono); font-size: 0.75rem; padding: 0.3rem 0.7rem; border-radius: 999px; white-space: nowrap; font-weight: 500; }
    .badge-green { background: var(--emerald-dim); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.25); }
    .badge-red { background: var(--red-dim); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.25); }

    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-top: 0.75rem; }
    .metric { background: rgba(30,41,59,0.5); border: 1px solid rgba(51,65,85,0.5); border-radius: 0.5rem; padding: 0.6rem 0.75rem; }
    .metric-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .metric-value { font-size: 1rem; font-weight: 600; margin-top: 0.15rem; font-family: var(--mono); }

    .center-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--emerald); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid rgba(51,65,85,0.3); display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); }

    .sub-section { margin-top: 1.5rem; }
    .sub-title { font-size: 1rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.8rem; }

    @media (max-width: 640px) {
      header h1 { font-size: 1.75rem; }
      .ptf-banner { grid-template-columns: 1fr; }
      .positions-table { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="center-msg" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:1rem; color:var(--text-dim)">Loading model data…</p>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');

    fetch('./data.json')
      .then(r => { if (!r.ok) throw new Error('No data'); return r.json(); })
      .then(render)
      .catch((e) => {
        console.error(e);
        document.getElementById('loading').innerHTML = `
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <h2 style="margin-top:1rem;font-size:1.5rem;font-weight:700">Data Unavailable</h2>
          <p style="color:var(--text-dim);margin-top:0.5rem">Model hasn't run yet. Check back after the next scheduled run.</p>`;
      });

    function fmt(n, d=2) { return (n ?? 0).toFixed(d); }
    function pnlClass(v) { return v >= 0 ? 'pnl-pos' : 'pnl-neg'; }
    function sign(v) { return v >= 0 ? '+' : ''; }

    function render(data) {
      const ptf = data.portfolio || {};
      const totalVal = ptf.total_value ?? 10000;
      const cash = ptf.cash ?? 10000;
      const totalRet = ptf.total_return ?? 0;
      const totalRetPct = ptf.total_return_pct ?? 0;
      const positions = ptf.positions || [];
      const trades = ptf.recent_trades || [];

      const ts = new Date(data.updatedAt).toLocaleString('en-US', {
        timeZone: 'Asia/Riyadh', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });

      const retColor = totalRet >= 0 ? 'green' : 'red';

      app.innerHTML = `
        <header>
          <div>
            <h1>TASI Quant Model</h1>
            <p>Automated SSGA multi-factor scoring: Value + Quality + Yield.</p>
          </div>
          <div class="timestamp">🕐 ${ts}</div>
        </header>

        <!-- PORTFOLIO OVERVIEW -->
        <div class="glass" style="margin-bottom:2rem; border-color:rgba(16,185,129,0.15); box-shadow:0 0 30px rgba(16,185,129,0.06)">
          <div class="section-title" style="margin-bottom:1rem"><span class="dot dot-amber"></span> Model Portfolio (Score-Weighted)</div>
          <div class="ptf-banner">
            <div class="ptf-stat">
              <div class="label">Total Value</div>
              <div class="val green">${fmt(totalVal)} SAR</div>
            </div>
            <div class="ptf-stat">
              <div class="label">Cash Available</div>
              <div class="val">${fmt(cash)} SAR</div>
            </div>
            <div class="ptf-stat">
              <div class="label">Total Return</div>
              <div class="val ${retColor}">${sign(totalRet)}${fmt(totalRet)} (${sign(totalRetPct)}${fmt(totalRetPct)}%)</div>
            </div>
          </div>

          ${positions.length > 0 ? `
          <div class="sub-section">
            <div class="sub-title">Current Holdings</div>
            <table class="positions-table">
              <thead><tr>
                <th>Stock</th><th>Weight</th><th>Buy Price</th><th>Current</th><th>P&L</th><th>Since</th>
              </tr></thead>
              <tbody>
                ${positions.map(p => `
                  <tr>
                    <td><strong>${p.name}</strong><br><span style="color:var(--text-dim);font-family:var(--mono);font-size:0.7rem">${p.ticker}</span></td>
                    <td style="font-family:var(--mono)">${fmt(p.weight_pct || (100/positions.length),1)}%</td>
                    <td style="font-family:var(--mono)">${fmt(p.buy_price)}</td>
                    <td style="font-family:var(--mono)">${fmt(p.current_price)}</td>
                    <td class="${pnlClass(p.unrealized_pnl)}" style="font-family:var(--mono)">${sign(p.unrealized_pnl)}${fmt(p.unrealized_pnl)} (${sign(p.pnl_pct)}${fmt(p.pnl_pct)}%)</td>
                    <td style="color:var(--text-dim);font-size:0.75rem">${p.buy_date}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : '<p style="color:var(--text-dim);margin-top:0.5rem">No positions yet — waiting for first model run.</p>'}

          ${trades.length > 0 ? `
          <div class="sub-section">
            <div class="sub-title">Recent Trades</div>
            <div class="trade-log">
              ${trades.slice().reverse().map(t => `
                <div class="trade-item">
                  <div style="display:flex;align-items:center;gap:0.5rem">
                    <span class="trade-side ${t.side === 'BUY' ? 'trade-buy' : 'trade-sell'}">${t.side}</span>
                    <span>${t.name || t.ticker}</span>
                    ${t.weight_pct ? `<span style="color:var(--text-dim);font-size:0.7rem">(${t.weight_pct}%)</span>` : ''}
                  </div>
                  <div style="text-align:right;font-family:var(--mono);font-size:0.8rem">
                    <div>${fmt(t.price)} × ${fmt(t.shares,4)}</div>
                    ${t.pnl ? `<div class="${pnlClass(t.pnl)}">${sign(t.pnl)}${fmt(t.pnl)} SAR</div>` : `<div style="color:var(--text-dim)">${t.date}</div>`}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}
        </div>

        <!-- TOP 5 -->
        <section style="margin-bottom:2.5rem">
          <div class="section-title"><span class="dot dot-green"></span> Confirmed Buys — Top 5</div>
          <div class="grid grid-2">${(data.top5 || []).map(stockCard('green')).join('')}</div>
        </section>

        <!-- BOTTOM 5 -->
        <section>
          <div class="section-title"><span class="dot dot-red"></span> Least Attractive — Bottom 5</div>
          <div class="grid grid-2">${(data.bottom5 || []).map(stockCard('red')).join('')}</div>
        </section>

        <footer>
          <div style="width:100%">
            <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
              <span>SSGA Multi-Factor Model</span>
              <span>TASI Quant • Open Source</span>
            </div>
            <div style="padding:1rem;background:rgba(15,23,42,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:0.5rem;font-size:0.7rem;color:var(--text-dim);line-height:1.6">
              <strong style="color:var(--text);font-size:0.75rem">Disclaimer</strong><br>
              The information provided on this platform is for educational and informational purposes only and does not constitute financial, investment, or legal advice. Investing involves risk, including the loss of principal. We are not liable for any losses arising from the use of this content. Please consult a CMA-licensed financial advisor before making any investment decisions.
            </div>
          </div>
        </footer>
      `;
    }

    function stockCard(color) {
      return function(s) {
        return `
          <div class="glass card">
            <div class="card-header">
              <div>
                <div class="card-name">${s.Name || s.Ticker}</div>
                <div class="card-ticker ${color}">${s.Ticker}</div>
              </div>
              <span class="badge badge-${color}">Score: ${fmt(s.Total_Score)}</span>
            </div>
            <div class="metrics">
              <div class="metric"><div class="metric-label">Value</div><div class="metric-value">${fmt(s.Value_Score)}</div></div>
              <div class="metric"><div class="metric-label">Quality</div><div class="metric-value">${fmt(s.Quality_Score)}</div></div>
              <div class="metric"><div class="metric-label">Yield</div><div class="metric-value">${fmt(s.Yield_Score)}</div></div>
            </div>
          </div>`;
      };
    }
  </script>
</body>
</html>
